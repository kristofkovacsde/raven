<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Raven's Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #07060d;
    --bg-1: #0d0b1a;
    --ink: #ede9fe;
    --ink-dim: #8b85a8;
    --ink-mute: #565273;
    --violet: #a78bfa;
    --violet-deep: #6d49d8;
    --violet-glow: #4f46e5;
    --danger: #ef4444;
    --gold: #fbbf24;
    --line: #1f1b3a;
    --line-soft: #15122a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, #1a1538 0%, transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 100%, #120a26 0%, transparent 65%),
      var(--bg-0);
    color: var(--ink);
    font-family: 'Cormorant Garamond', 'Iowan Old Style', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .scaler {
    transform-origin: center center;
    will-change: transform;
  }

  /* drifting fog */
  body::before, body::after {
    content: '';
    position: absolute; inset: -20%;
    background:
      radial-gradient(circle at 20% 30%, rgba(167,139,250,0.05) 0%, transparent 25%),
      radial-gradient(circle at 80% 70%, rgba(99,102,241,0.04) 0%, transparent 30%),
      radial-gradient(circle at 60% 20%, rgba(167,139,250,0.03) 0%, transparent 20%);
    pointer-events: none;
    animation: drift 40s linear infinite;
  }
  body::after {
    animation-duration: 60s;
    animation-direction: reverse;
    opacity: 0.6;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-3%, 2%) rotate(360deg); }
  }

  /* faint star field */
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(237,233,254,0.6), transparent),
      radial-gradient(1px 1px at 27% 62%, rgba(237,233,254,0.4), transparent),
      radial-gradient(1px 1px at 44% 12%, rgba(237,233,254,0.5), transparent),
      radial-gradient(1px 1px at 61% 78%, rgba(237,233,254,0.3), transparent),
      radial-gradient(1px 1px at 73% 24%, rgba(237,233,254,0.5), transparent),
      radial-gradient(1px 1px at 89% 56%, rgba(237,233,254,0.4), transparent),
      radial-gradient(1px 1px at 8% 85%, rgba(237,233,254,0.35), transparent),
      radial-gradient(1px 1px at 36% 90%, rgba(237,233,254,0.3), transparent),
      radial-gradient(1px 1px at 92% 12%, rgba(237,233,254,0.5), transparent);
    pointer-events: none;
    animation: twinkle 6s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 0.9; }
  }

  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 2;
  }

  /* ─── Title ─────────────────────────────────────────────── */
  .title-row {
    display: flex;
    align-items: center;
    gap: 28px;
    color: var(--ink);
  }
  .title-row .ornament {
    flex: 0 0 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--violet-deep) 50%, transparent);
    position: relative;
  }
  .title-row .ornament::before {
    content: '✦';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    color: var(--violet);
    font-size: 10px;
    background: var(--bg-0);
    padding: 0 8px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 42px;
    letter-spacing: 0.12em;
    color: var(--ink);
    text-shadow: 0 0 30px rgba(167, 139, 250, 0.4);
    display: flex;
    align-items: baseline;
    gap: 14px;
    white-space: nowrap;
  }
  h1 .moon {
    font-style: normal;
    color: var(--violet);
    font-size: 26px;
    letter-spacing: 0;
    text-shadow: 0 0 18px var(--violet);
  }
  h1 .word {
    background: linear-gradient(180deg, #f5f3ff 0%, #c4b5fd 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ─── HUD ───────────────────────────────────────────────── */
  #hud {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    width: 800px;
    background: linear-gradient(180deg, rgba(20,17,40,0.85), rgba(13,11,26,0.85));
    border: 1px solid var(--line);
    border-radius: 2px;
    backdrop-filter: blur(8px);
    position: relative;
    box-shadow:
      0 1px 0 rgba(167,139,250,0.08) inset,
      0 20px 60px rgba(0,0,0,0.5);
  }
  #hud::before, #hud::after {
    content: '';
    position: absolute;
    top: -1px; bottom: -1px;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--violet-deep), transparent);
    opacity: 0.5;
  }
  #hud::before { left: 33.333%; }
  #hud::after  { left: 66.666%; }

  .stat {
    padding: 14px 22px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .stat-value .suffix {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mute);
    font-weight: 400;
    letter-spacing: 0.18em;
  }
  .stat--hp .stat-value      { color: #f0abfc; }
  .stat--score .stat-value   { color: #fde68a; }
  .stat--wave .stat-value    { color: #c4b5fd; }

  /* tiny hp bar in the HUD strip */
  .hp-track {
    height: 3px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
    position: relative;
  }
  .hp-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #f0abfc, #a78bfa);
    box-shadow: 0 0 8px rgba(240,171,252,0.6);
    transition: width 0.3s ease, background 0.3s ease;
  }

  /* ─── Canvas frame ──────────────────────────────────────── */
  .canvas-wrap {
    position: relative;
    padding: 14px;
    background: linear-gradient(180deg, rgba(20,17,40,0.6), rgba(13,11,26,0.6));
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow:
      0 0 0 1px rgba(167,139,250,0.05),
      0 30px 80px rgba(0,0,0,0.6),
      0 0 120px rgba(79, 70, 229, 0.15);
  }
  .canvas-wrap::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 2px;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(167,139,250,0.3), transparent 30%, transparent 70%, rgba(167,139,250,0.1));
    z-index: -1;
    filter: blur(8px);
    opacity: 0.6;
  }
  /* corner brackets */
  .bracket {
    position: absolute;
    width: 14px; height: 14px;
    border: 1px solid var(--violet);
    opacity: 0.7;
  }
  .bracket.tl { top: -1px;    left: -1px;    border-right: 0; border-bottom: 0; }
  .bracket.tr { top: -1px;    right: -1px;   border-left: 0;  border-bottom: 0; }
  .bracket.bl { bottom: -1px; left: -1px;    border-right: 0; border-top: 0; }
  .bracket.br { bottom: -1px; right: -1px;   border-left: 0;  border-top: 0; }

  canvas {
    display: block;
    border-radius: 1px;
    background: var(--bg-0);
    box-shadow: 0 0 0 1px var(--line-soft);
  }

  /* ─── Controls bar ──────────────────────────────────────── */
  #controls {
    display: flex;
    align-items: center;
    gap: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  #controls .key-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #controls kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 5px;
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    background: linear-gradient(180deg, #1a1633, #100d22);
    color: var(--ink);
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0;
    box-shadow: 0 1px 0 rgba(167,139,250,0.1) inset;
  }
  #controls .sep {
    color: var(--ink-mute);
    opacity: 0.4;
  }
  #controls .verb {
    color: var(--ink-dim);
  }
  #controls .accent { color: var(--violet); }
  #mute-btn {
    background: linear-gradient(180deg, #1a1633, #100d22);
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    color: var(--ink);
    font-size: 13px;
    width: 22px; height: 20px;
    border-radius: 3px;
    cursor: pointer;
    padding: 0;
    box-shadow: 0 1px 0 rgba(167,139,250,0.1) inset;
    transition: color 0.15s;
    line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
  }
  #mute-btn:hover { color: var(--violet); }
  #mute-btn.muted { color: var(--ink-mute); }

  /* ─── Mobile D-pad ──────────────────────────────────────── */
  #dpad {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom, 0px), 16px);
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 6px;
    z-index: 200;
    touch-action: none;
  }
  /* Hide on desktop mouse devices */
  @media (hover: hover) and (pointer: fine) { #dpad { display: none; } }
  .dpad-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(13,11,26,0.75);
    border: 1.5px solid var(--violet);
    color: var(--violet);
    font-size: 22px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: 0 0 12px rgba(109,73,216,0.25);
  }
  .dpad-btn:active { background: rgba(109,73,216,0.38); border-color: #c4b5fd; }
  .dpad-center {
    display: flex; align-items: center; justify-content: center;
    color: rgba(109,73,216,0.35); font-size: 18px; pointer-events: none;
  }
</style>
</head>
<body>
  <div class="stars"></div>

  <div class="scaler"><div class="stage">

    <div class="title-row">
      <div class="ornament"></div>
      <h1>
        <span class="moon">☽</span>
        <span class="word">Raven's</span>
        <span class="word" style="font-style: normal; font-weight: 400;">Quest</span>
        <span class="moon">☾</span>
      </h1>
      <div class="ornament"></div>
    </div>

    <div id="hud">
      <div class="stat stat--hp">
        <div class="stat-label">Vitality</div>
        <div class="stat-value"><span id="hp">100</span><span class="suffix">/ 100</span></div>
        <div class="hp-track"><div class="hp-fill" id="hp-fill"></div></div>
      </div>
      <div class="stat stat--score">
        <div class="stat-label">Soul Essence</div>
        <div class="stat-value"><span id="score">0</span><span class="suffix">pts</span></div>
      </div>
      <div class="stat stat--wave">
        <div class="stat-label">Trial</div>
        <div class="stat-value">Wave <span id="wave">1</span><span class="suffix">/ 5</span></div>
      </div>
    </div>

    <div class="canvas-wrap">
      <span class="bracket tl"></span>
      <span class="bracket tr"></span>
      <span class="bracket bl"></span>
      <span class="bracket br"></span>
      <canvas id="c" width="800" height="560"></canvas>
    </div>

    <div id="controls">
      <span class="key-group">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
        <span class="verb">move</span>
      </span>
      <span class="sep">·</span>
      <span class="key-group">
        <span class="accent">◉</span>
        <span class="verb">collect <span style="color:var(--gold)">worms</span></span>
      </span>
      <span class="sep">·</span>
      <span class="key-group">
        <span style="color:#4ade80">✚</span>
        <span class="verb"><span style="color:#86efac">peanut</span> heals</span>
      </span>
      <span class="sep">·</span>
      <span class="key-group">
        <span style="color:#fbbf24">◈</span>
        <span class="verb"><span style="color:#fde68a">walnut</span> immunity</span>
      </span>
      <span class="sep">·</span>
      <span class="key-group">
        <span style="color:var(--danger)">✕</span>
        <span class="verb">flee <span style="color:#fca5a5">eagles</span></span>
      </span>
      <span class="sep">·</span>
      <span class="key-group">
        <kbd>↵</kbd>
        <span class="verb">restart</span>
      </span>
      <span class="sep">·</span>
      <span class="key-group">
        <button id="mute-btn" onclick="toggleMute()">♪</button>
        <span class="verb">sound</span>
      </span>
    </div>

  </div></div>

  <!-- Mobile D-pad (hidden on desktop via CSS media query) -->
  <div id="dpad">
    <span></span>
    <button class="dpad-btn" data-dir="up">▲</button>
    <span></span>
    <button class="dpad-btn" data-dir="left">◀</button>
    <span class="dpad-center">✦</span>
    <button class="dpad-btn" data-dir="right">▶</button>
    <span></span>
    <button class="dpad-btn" data-dir="down">▼</button>
    <span></span>
  </div>

  <script src="game.js"></script>
  <script>
    // sync HP bar with game state
    const _hpEl   = document.getElementById('hp');
    const hpFill = document.getElementById('hp-fill');
    const _setHp = () => {
      const v = parseInt(_hpEl.textContent, 10) || 0;
      hpFill.style.width = Math.max(0, Math.min(100, v)) + '%';
      hpFill.style.background = v > 50
        ? 'linear-gradient(90deg, #f0abfc, #a78bfa)'
        : v > 25
        ? 'linear-gradient(90deg, #fde68a, #fbbf24)'
        : 'linear-gradient(90deg, #fca5a5, #ef4444)';
    };
    // observe text changes on the HP span
    new MutationObserver(_setHp).observe(_hpEl, { childList: true, characterData: true, subtree: true });
    _setHp();

    // Auto-scale the whole stage to fit any viewport
    const scaler = document.querySelector('.scaler');
    const stage  = document.querySelector('.stage');
    const fitStage = () => {
      scaler.style.transform = 'none';
      const rect = stage.getBoundingClientRect();
      const padX = 24, padY = 16;
      const sx = (window.innerWidth  - padX * 2) / rect.width;
      const sy = (window.innerHeight - padY * 2) / rect.height;
      const s  = Math.min(1, sx, sy);
      scaler.style.transform = `scale(${s})`;
    };
    window.addEventListener('resize', fitStage);
    // Wait for fonts so measurements are stable
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fitStage);
    }
    fitStage();
  </script>
</body>
</html>
